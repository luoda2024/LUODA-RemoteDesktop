name: Build LUODA macOS DMG

on:
  workflow_dispatch:

jobs:
  build-dmg:
    runs-on: macos-14
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.88"

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Generate FFI bridge
        run: |
          echo "=== Installing cargo-expand ==="
          cargo install cargo-expand --version 1.0.95 --locked 2>&1 | tail -5
          echo "=== Installing flutter_rust_bridge_codegen ==="
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked 2>&1 | tail -5
          echo "=== Running flutter pub get ==="
          cd flutter && flutter pub get && cd ..
          echo "=== Running flutter_rust_bridge_codegen ==="
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h 2>&1
          echo "=== Verifying generated file ==="
          ls -la flutter/lib/generated_bridge.dart || echo "ERROR: generated_bridge.dart not created!"
          head -5 flutter/lib/generated_bridge.dart || echo "ERROR: Cannot read file!" 

      - name: Install dependencies via vcpkg
        run: |
          # vcpkg replaces homebrew for libyuv (removed from brew)
          # Full clone needed (not --depth=1) so vcpkg can resolve baseline commits
          # nasm must be installed BEFORE vcpkg (needed by aom)
          brew install nasm
          # macOS 14 (ARM64) installs brew to /opt/homebrew — ensure PATH includes it
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          which nasm && nasm --version
          git clone https://github.com/Microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh
          /tmp/vcpkg/vcpkg install
          echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV

      - name: Build Rust
        run: cargo build --release --features flutter

      - name: Build Flutter macOS
        run: |
          cd flutter
          # Fix: disable nullability warnings-as-errors from system headers
          export OTHER_CFLAGS="-Wno-error=nullability-completeness -Wno-error=nullability"
          export OTHER_CPLUSPLUSFLAGS="-Wno-error=nullability-completeness -Wno-error=nullability"
          flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          mkdir -p dmg_folder
          cp -r flutter/build/macos/Build/Products/Release/LUODA.app dmg_folder/
          create-dmg --volname "LUODA" --window-size 800 400 --app-drop-link 600 185 "LUODA-1.0.dmg" dmg_folder/

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-DMG
          path: LUODA-1.0.dmg
