name: Build LUODA Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'libs/**'
      - 'flutter/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-apk.yml'

env:
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-apk-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-apk-${{ runner.os }}-

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake clang git nasm yasm ninja-build \
            libssl-dev libopus-dev libvpx-dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        timeout-minutes: 10
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.88"
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Ensure correct cargo version
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          cargo --version
          rustup default 1.88

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 2.11.0 --locked

      - name: Setup opus headers for Android build
        run: |
          OPUS_INCLUDE=$(pwd)/target/opus-include/opus
          mkdir -p $OPUS_INCLUDE
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus.h -O $OPUS_INCLUDE/opus.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_multistream.h -O $OPUS_INCLUDE/opus_multistream.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_defines.h -O $OPUS_INCLUDE/opus_defines.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_types.h -O $OPUS_INCLUDE/opus_types.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_projection.h -O $OPUS_INCLUDE/opus_projection.h
          ls -la $OPUS_INCLUDE/
          echo "OPUS_INCLUDE_PATH=$(pwd)/target/opus-include" >> $GITHUB_ENV

      - name: Setup vpx headers for Android build
        run: |
          VPX_INCLUDE=$(pwd)/target/vpx-include/vpx
          mkdir -p $VPX_INCLUDE
          BASE_URL="https://raw.githubusercontent.com/webmproject/libvpx/main/vpx"
          for f in vp8.h vp8cx.h vp8dx.h vpx_codec.h vpx_decoder.h vpx_encoder.h vpx_image.h vpx_integer.h vpx_ext_ratectrl.h vpx_tpl.h vpx_frame_buffer.h; do
            wget -q "$BASE_URL/$f" -O "$VPX_INCLUDE/$f" || echo "WARN: failed to download $f"
          done
          ls -la $VPX_INCLUDE/
          echo "VPX_INCLUDE_PATH=$(pwd)/target/vpx-include" >> $GITHUB_ENV

      - name: Generate FFI bridge
        run: |
          cargo install cargo-expand --version 1.0.95 --locked 2>&1 | tail -5
          echo "=== Installing flutter_rust_bridge_codegen ==="
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked 2>&1 | tail -5
          echo "=== Running flutter pub get ==="
          cd flutter && flutter pub get && cd ..
          echo "=== Running flutter_rust_bridge_codegen ==="
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart 2>&1
          echo "=== Verifying generated file ==="
          ls -la flutter/lib/generated_bridge.dart || echo "ERROR: generated_bridge.dart not created!"
          head -5 flutter/lib/generated_bridge.dart || echo "ERROR: Cannot read file!"

      - name: Build Rust library for Android
        timeout-minutes: 90
        run: |
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG=${{ env.VCPKG_ROOT }}
          OUT=flutter/android/app/src/main/jniLibs
          OPUS_INCLUDE=${{ env.OPUS_INCLUDE_PATH }}
          VPX_INCLUDE=${{ env.VPX_INCLUDE_PATH }}

          for TARGET_ABI in arm64-v8a x86_64; do
            case $TARGET_ABI in
              arm64-v8a)
                RUST_TARGET=aarch64-linux-android
                VCPKG_TRIPLET=arm64-android
                ;;
              x86_64)
                RUST_TARGET=x86_64-linux-android
                VCPKG_TRIPLET=x64-android
                ;;
            esac

            echo "=========================================="
            echo "Building for $TARGET_ABI ($RUST_TARGET)..."
            echo "=========================================="

            echo "Installing vcpkg packages for $VCPKG_TRIPLET..."
            export VCPKG_BINARY_SOURCES="clear;files,$VCPKG/archives,readwrite"
            for i in 1 2 3; do
              echo "vcpkg install attempt $i/3 for $VCPKG_TRIPLET..."
              # timeout 20min: prevent vcpkg from hanging indefinitely
              timeout 1200 $VCPKG/vcpkg install \
                --triplet=$VCPKG_TRIPLET \
                --x-install-root="$VCPKG/installed" \
                --clean-after-build && break
              RET=$?
              if [ $RET -eq 124 ]; then
                echo "vcpkg timed out (20 min), retrying..."
              else
                echo "Attempt $i failed (exit=$RET), retrying in 15s..."
              fi
              sleep 15
            done

            VCPKG_INCLUDE_FLAG=""
            if [ -d "$VCPKG/installed/$VCPKG_TRIPLET/include" ]; then
              VCPKG_INCLUDE_FLAG="-isystem $VCPKG/installed/$VCPKG_TRIPLET/include"
              echo "vcpkg include: $VCPKG/installed/$VCPKG_TRIPLET/include"
            fi

            VCPKG_LIB_FLAG=""
            if [ -d "$VCPKG/installed/$VCPKG_TRIPLET/lib" ]; then
              VCPKG_LIB_FLAG="-L$VCPKG/installed-$VCPKG_TRIPLET/$VCPKG_TRIPLET/lib"
              echo "vcpkg lib: $VCPKG/installed-$VCPKG_TRIPLET/$VCPKG_TRIPLET/lib"
            fi

            BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot -I$OPUS_INCLUDE -I$VPX_INCLUDE $VCPKG_INCLUDE_FLAG" \
            CFLAGS="-I$OPUS_INCLUDE -I$VPX_INCLUDE $VCPKG_INCLUDE_FLAG" \
            CXXFLAGS="-I$OPUS_INCLUDE -I$VPX_INCLUDE $VCPKG_INCLUDE_FLAG" \
            RUSTFLAGS="-C link-args=$VCPKG_LIB_FLAG" \
            cargo ndk -t $TARGET_ABI -o $OUT build --release --features flutter --features use_dasp --features mediacodec --target $RUST_TARGET

            echo "OK: $TARGET_ABI build complete"
          done
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}

      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      - name: Generate Flutter Rust Bridge code
        run: |
          cd flutter
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Fix Kotlin version + debug signing for APK
        run: |
          # Fix 1: PREPEND ext.kotlin_version at top of build.gradle
          # (appending doesn't work because Flutter plugin reads it during config phase)
          sed -i "1i ext.kotlin_version = '1.9.10'" ./flutter/android/build.gradle
          # Fix 2: Suppress Kotlin metadata version check to fix incompatibility
          # between Kotlin 1.9.10 and AndroidX libs compiled with Kotlin 1.8.0
          cat >> ./flutter/android/build.gradle << 'KOTLIN_FIX'
          allprojects {
              tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                  kotlinOptions {
                      freeCompilerArgs += ['-Xskip-metadata-version-check']
                  }
              }
          }
          KOTLIN_FIX
          # Replace release signing with debug (fallback to default Android debug keystore)
          sed -i "s/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/g" ./flutter/android/app/build.gradle
          # Verify the change took effect
          grep -n 'signingConfig' ./flutter/android/app/build.gradle || true
          grep 'kotlin_version' ./flutter/android/build.gradle || true

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release --split-per-abi 2>&1 | tail -50
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError"

      - name: Verify APK exists
        run: |
          echo "=== Per-ABI APKs ==="
          ls -la flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          ls -la flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk
          echo "arm64 APK size: $(stat -c%s flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk) bytes"
          echo "x86_64 APK size: $(stat -c%s flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk) bytes"

      - name: Upload APK (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-APK-arm64
          path: flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error

      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-APK-x86_64
          path: flutter/build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
