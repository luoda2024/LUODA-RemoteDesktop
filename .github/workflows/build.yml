name: LUODA Full Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - android
          - linux

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Git for Submodules
        run: |
          git config --global url."https://".insteadOf "git://"
          git config --global http.postBuffer 524288000
        shell: bash
      
      - name: Update Submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 --force
        shell: bash
        timeout-minutes: 20
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release --features flutter
        shell: bash
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: luoda-windows-exe
          path: target/release/rustdesk.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Git for Submodules
        run: |
          git config --global url."https://".insteadOf "git://"
          git config --global http.postBuffer 524288000
      
      - name: Update Submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 --force
        timeout-minutes: 20
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luoda-android-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Git for Submodules
        run: |
          git config --global url."https://".insteadOf "git://"
          git config --global http.postBuffer 524288000
      
      - name: Update Submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1 --force
        timeout-minutes: 20
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake protobuf-compiler libxcb1-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release --features flutter
      
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: luoda-linux-binary
          path: target/release/rustdesk
