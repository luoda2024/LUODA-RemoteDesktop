name: LUODA Build All Platforms

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake curl git nasm yasm ninja-build \
            clang pkg-config unzip wget libssl-dev \
            libgtk-3-dev libayatana-appindicator3-dev \
            libasound2-dev libpulse-dev libpam0g-dev \
            libxcb-randr0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxdo-dev libxfixes-dev libva-dev libclang-dev \
            libopus-dev libvpx-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev || true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}

      - name: Create DEB package
        run: |
          mkdir -p debian-luoda/DEBIAN debian-luoda/usr/bin debian-luoda/usr/share/applications debian-luoda/usr/share/icons/hicolor/128x128/apps
          echo "Package: luoda" > debian-luoda/DEBIAN/control
          echo "Version: 1.0.0" >> debian-luoda/DEBIAN/control
          echo "Architecture: amd64" >> debian-luoda/DEBIAN/control
          echo "Maintainer: LUODA Team" >> debian-luoda/DEBIAN/control
          echo "Description: LUODA Remote Desktop" >> debian-luoda/DEBIAN/control
          if [ -f "target/release/luoda" ]; then
            cp target/release/luoda debian-luoda/usr/bin/
            chmod +x debian-luoda/usr/bin/luoda
          fi
          echo "[Desktop Entry]" > debian-luoda/usr/share/applications/luoda.desktop
          echo "Name=LUODA" >> debian-luoda/usr/share/applications/luoda.desktop
          echo "Comment=Remote Desktop" >> debian-luoda/usr/share/applications/luoda.desktop
          echo "Exec=/usr/bin/luoda" >> debian-luoda/usr/share/applications/luoda.desktop
          echo "Icon=luoda" >> debian-luoda/usr/share/applications/luoda.desktop
          echo "Type=Application" >> debian-luoda/usr/share/applications/luoda.desktop
          echo "Categories=Network;RemoteAccess;" >> debian-luoda/usr/share/applications/luoda.desktop
          cp res/128x128.png debian-luoda/usr/share/icons/hicolor/128x128/apps/luoda.png 2>/dev/null || true
          dpkg-deb --build debian-luoda luoda_1.0.0_amd64.deb
          ls -la luoda_*.deb || echo "DEB not created"

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-linux-deb-${{ github.run_number }}
          path: luoda_1.0.0_amd64.deb
          if-no-files-found: warn

  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          $env:VCPKG_DEFAULT_HOST_TRIPLET = "x64-windows-static"
          & "$env:VCPKG_ROOT\vcpkg" install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT/installed"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release
        env:
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
          VCPKG_DEFAULT_TRIPLET: x64-windows-static

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-windows-exe
          path: |
            target/release/luoda.exe
            target/release/luoda.pdb
          if-no-files-found: warn

  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: false

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake clang git nasm yasm ninja-build \
            libssl-dev libopus-dev libvpx-dev

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}

      - name: Install vcpkg dependencies
        run: |
          $VCPKG_ROOT/vcpkg install --x-install-root="$VCPKG_ROOT/installed"
        shell: bash

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Install vcpkg Android dependencies
        run: |
          for TRIPLET in arm64-android x64-android; do
            echo "Installing vcpkg packages for $TRIPLET..."
            ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }} $VCPKG_ROOT/vcpkg install --triplet=$TRIPLET --x-install-root="$VCPKG_ROOT/installed"
          done
        shell: bash

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 2.11.0 --locked

      - name: Setup opus headers for Android build
        run: |
          # 手动下载 opus 头文件到标准位置，避免 vcpkg 路径问题
          OPUS_INCLUDE=$(pwd)/target/opus-include/opus
          mkdir -p $OPUS_INCLUDE

          # 从官方仓库下载头文件
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus.h -O $OPUS_INCLUDE/opus.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_multistream.h -O $OPUS_INCLUDE/opus_multistream.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_defines.h -O $OPUS_INCLUDE/opus_defines.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_types.h -O $OPUS_INCLUDE/opus_types.h
          wget -q https://raw.githubusercontent.com/xiph/opus/master/include/opus_projection.h -O $OPUS_INCLUDE/opus_projection.h

          echo "=== 下载的 opus 头文件 ==="
          ls -la $OPUS_INCLUDE/

          # 设置环境变量供后续步骤使用
          echo "OPUS_INCLUDE_PATH=$(pwd)/target/opus-include" >> $GITHUB_ENV

      - name: Setup vpx headers for Android build
        run: |
          # 手动下载 vpx 头文件到标准位置，避免 vcpkg 路径问题
          VPX_INCLUDE=$(pwd)/target/vpx-include/vpx
          mkdir -p $VPX_INCLUDE

          # 从官方仓库下载头文件
          BASE_URL="https://raw.githubusercontent.com/webmproject/libvpx/main/vpx"
          for f in vp8.h vp8cx.h vp8dx.h vpx_codec.h vpx_decoder.h vpx_encoder.h vpx_image.h vpx_integer.h; do
            wget -q "$BASE_URL/$f" -O "$VPX_INCLUDE/$f" || echo "WARN: failed to download $f"
          done

          echo "=== 下载的 vpx 头文件 ==="
          ls -la $VPX_INCLUDE/

          echo "VPX_INCLUDE_PATH=$(pwd)/target/vpx-include" >> $GITHUB_ENV

      - name: Build Rust library for Android
        run: |
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG=${{ env.VCPKG_ROOT }}
          OUT=flutter/android/app/src/main/jniLibs
          OPUS_INCLUDE=${{ env.OPUS_INCLUDE_PATH }}

          for TARGET_ABI in arm64-v8a x86_64; do
            case $TARGET_ABI in
              arm64-v8a)
                RUST_TARGET=aarch64-linux-android
                VCPKG_TRIPLET=arm64-android
                ;;
              x86_64)
                RUST_TARGET=x86_64-linux-android
                VCPKG_TRIPLET=x64-android
                ;;
            esac

            echo "Building for $TARGET_ABI ($RUST_TARGET)..."

            BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot -I$OPUS_INCLUDE -I$VPX_INCLUDE -isystem $VCPKG/installed/$VCPKG_TRIPLET/include" \
            CFLAGS="-I$OPUS_INCLUDE -I$VPX_INCLUDE -isystem $VCPKG/installed/$VCPKG_TRIPLET/include" \
            CXXFLAGS="-I$OPUS_INCLUDE -I$VPX_INCLUDE -isystem $VCPKG/installed/$VCPKG_TRIPLET/include" \
            cargo ndk -t $TARGET_ABI -o $OUT build --release --features flutter --features use_dasp --features mediacodec --target $RUST_TARGET
          done
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: ${{ env.VCPKG_ROOT }}

      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      - name: Generate Flutter Rust Bridge code
        run: |
          cd flutter
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release 2>&1 | tail -50
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Verify APK exists
        run: |
          ls -la flutter/build/app/outputs/flutter-apk/app-release.apk
          echo "APK size: $(stat -c%s flutter/build/app/outputs/flutter-apk/app-release.apk) bytes"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-android-apk
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
