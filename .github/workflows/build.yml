name: LUODA Full Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GIT_HTTP_LOW_SPEED_LIMIT: "1000"
  GIT_HTTP_LOW_SPEED_TIME: "60"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Clone hbb_common submodule
        run: |
          rm -rf libs/hbb_common
          git clone --depth 1 https://github.com/rustdesk/hbb_common.git libs/hbb_common
          cd libs/hbb_common
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            curl \
            gcc \
            g++ \
            git \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libclang-10-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgtk-3-dev \
            libpam0g-dev \
            libpulse-dev \
            libva-dev \
            libxcb-randr0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxfixes-dev \
            llvm-10-dev \
            nasm \
            ninja-build \
            pkg-config \
            python3 \
            libssl-dev \
            libopus-dev
        shell: bash
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: /opt/artifacts/vcpkg
          vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"
          doNotCache: false
      
      - name: Install vcpkg dependencies
        run: |
          sudo apt install -y libva-dev
          if ! $VCPKG_ROOT/vcpkg \
            install \
            --triplet x64-linux \
            --x-install-root="$VCPKG_ROOT/installed"; then
            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
              echo "$_1:"
              echo "======"
              cat "$_1"
              echo "======"
              echo ""
            done
            exit 1
          fi
        shell: bash
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"
      
      - name: Build
        run: |
          export VCPKG_ROOT=/opt/artifacts/vcpkg
          cargo build --release --features flutter
        shell: bash
      
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: luoda-linux-binary
          path: target/release/rustdesk
