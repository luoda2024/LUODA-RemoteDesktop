name: LUODA Full Build

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GIT_HTTP_LOW_SPEED_LIMIT: "1000"
  GIT_HTTP_LOW_SPEED_TIME: "60"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
      
      - name: Clone hbb_common submodule
        run: |
          rm -rf libs/hbb_common
          git clone --depth 1 https://github.com/rustdesk/hbb_common.git libs/hbb_common
          cd libs/hbb_common
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake protobuf-compiler libxcb1-dev libgtk-3-dev
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release --features flutter
      
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: luoda-linux-binary
          path: target/release/rustdesk

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clone hbb_common submodule
        run: |
          rm -rf libs/hbb_common
          git clone --depth 1 https://github.com/rustdesk/hbb_common.git libs/hbb_common
          cd libs/hbb_common
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30
        shell: bash
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release --features flutter
        shell: bash
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: luoda-windows-exe
          path: target/release/rustdesk.exe

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Clone hbb_common submodule
        run: |
          rm -rf libs/hbb_common
          git clone --depth 1 https://github.com/rustdesk/hbb_common.git libs/hbb_common
          cd libs/hbb_common
          git submodule update --init --recursive --depth 1
        timeout-minutes: 30
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
      
      - name: Build APK
        run: |
          cd flutter
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: luoda-android-apk
          path: flutter/build/app/outputs/flutter-apk/*.apk
