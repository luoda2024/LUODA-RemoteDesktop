name: Build LUODA Web

on:
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Build Web
        run: |
          cd flutter
          flutter pub get
          flutter build web --release 2>&1 | tail -30
          echo "=== Web build output ==="
          ls -la build/web/ | head -20
          echo "=== Total size ==="
          du -sh build/web/

      - name: Package Web
        run: |
          cd flutter/build
          mv web LUODA-web
          tar czf LUODA-web.tar.gz LUODA-web
          ls -la LUODA-web.tar.gz

      - name: Upload Web
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-Web
          path: flutter/build/LUODA-web.tar.gz
