  1905|
  1906|  build-flatpak:
  1907|    name: Build flatpak ${{ matrix.job.target }}${{ matrix.job.suffix }}
  1908|    needs:
  1909|      - build-rustdesk-linux
  1910|      - build-rustdesk-linux-sciter
  1911|    runs-on: ${{ matrix.job.on }}
  1912|    if: ${{ inputs.upload-artifact }}
  1913|    strategy:
  1914|      fail-fast: false
  1915|      matrix:
  1916|        job:
  1917|          - {
  1918|              target: x86_64-unknown-linux-gnu,
  1919|              # https://github.com/ostreedev/ostree/commit/4bac96a8c817beda37448f9b8c662162bb619981
  1920|              distro: ubuntu22.04,
  1921|              on: ubuntu-22.04,
  1922|              arch: x86_64,
  1923|              suffix: "",
  1924|            }
  1925|          - {
  1926|              target: x86_64-unknown-linux-gnu,
  1927|              distro: ubuntu22.04,
  1928|              on: ubuntu-22.04,
  1929|              arch: x86_64,
  1930|              suffix: "-sciter",
  1931|            }
  1932|          - {
  1933|              target: aarch64-unknown-linux-gnu,
  1934|              # try out newer flatpak since error of "error: Nothing matches org.freedesktop.Platform in remote flathub"
  1935|              distro: ubuntu22.04,
  1936|              on: ubuntu-22.04-arm,
  1937|              arch: aarch64,
  1938|              suffix: "",
  1939|            }
  1940|    steps:
  1941|      - name: Checkout source code
  1942|        uses: actions/checkout@v4
  1943|        with:
  1944|          submodules: recursive
  1945|
  1946|      - name: Download Binary
  1947|        uses: actions/download-artifact@master
  1948|        with:
  1949|          name: LUODA-${{ env.VERSION }}-${{ matrix.job.arch }}${{ matrix.job.suffix }}.deb
  1950|          path: .
  1951|
  1952|      - name: Rename Binary
  1953|        run: |
  1954|          mv LUODA-${{ env.VERSION }}-${{ matrix.job.arch }}${{ matrix.job.suffix }}.deb flatpak/rustdesk.deb
  1955|
  1956|      - uses: rustdesk-org/run-on-arch-action@amd64-support
  1957|        name: Build rustdesk flatpak package for ${{ matrix.job.arch }}
  1958|        id: flatpak
  1959|        with:
  1960|          arch: ${{ matrix.job.arch }}
  1961|          distro: ${{ matrix.job.distro }}
  1962|          githubToken: ${{ github.token }}
  1963|          setup: |
  1964|            ls -l "${PWD}"
  1965|          dockerRunArgs: |
  1966|            --volume "${PWD}:/workspace"
  1967|          shell: /bin/bash
  1968|          install: |
  1969|            apt-get update -y
  1970|            apt-get install -y git flatpak flatpak-builder
  1971|          run: |
  1972|            # disable git safe.directory
  1973|            git config --global --add safe.directory "*"
  1974|            pushd /workspace
  1975|            # flatpak deps
  1976|            flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
  1977|            # package
  1978|            pushd flatpak
  1979|            git clone https://github.com/flathub/shared-modules.git --depth=1
  1980|            flatpak-builder --user --install-deps-from=flathub -y --force-clean --repo=repo ./build ./rustdesk.json
  1981|            flatpak build-bundle ./repo LUODA-${{ env.VERSION }}-${{ matrix.job.arch }}${{ matrix.job.suffix }}.flatpak com.rustdesk.RustDesk
  1982|
  1983|      - name: Publish flatpak package
  1984|        uses: softprops/action-gh-release@v1
  1985|        with:
  1986|          prerelease: true
  1987|          tag_name: ${{ env.TAG_NAME }}
  1988|          files: |
  1989|            flatpak/LUODA-${{ env.VERSION }}-${{ matrix.job.arch }}${{ matrix.job.suffix }}.flatpak
