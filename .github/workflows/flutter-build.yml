   146|      - name: Install vcpkg dependencies
   147|        env:
   148|          VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.job.vcpkg-triplet }}
   149|        run: |
   150|          if ! $VCPKG_ROOT/vcpkg \
   151|            install \
   152|            --triplet ${{ matrix.job.vcpkg-triplet }} \
   153|            --x-install-root="$VCPKG_ROOT/installed"; then
   154|            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
   155|              echo "$_1:"
   156|              echo "======"
   157|              cat "$_1"
   158|              echo "======"
   159|              echo ""
   160|            done
   161|            exit 1
   162|          fi
   163|          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true
   164|        shell: bash
