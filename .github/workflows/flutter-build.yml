   555|  build-for-macOS:
   556|    name: ${{ matrix.job.target }}
   557|    runs-on: ${{ matrix.job.os }}
   558|    needs: [generate-bridge]
   559|    strategy:
   560|      fail-fast: false
   561|      matrix:
   562|        job:
   563|          - {
   564|              target: x86_64-apple-darwin,
   565|              os: macos-15-intel, #macos-latest or macos-14 use M1 now, https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners#:~:text=14%20GB-,macos%2Dlatest%20or%20macos%2D14,-The%20macos%2Dlatestlabel
   566|              extra-build-args: "",
   567|              arch: x86_64,
   568|              vcpkg-triplet: x64-osx,
   569|            }
   570|          - {
   571|              target: aarch64-apple-darwin,
   572|              os: macos-14,
   573|              # extra-build-args: "--disable-flutter-texture-render", # disable this for mac, because we see a lot of users reporting flickering both on arm and x64, and we can not confirm if texture rendering has better performance if htere is no vram, https://github.com/rustdesk/rustdesk/issues/6296
   574|              extra-build-args: "--screencapturekit",
   575|              arch: aarch64,
   576|              vcpkg-triplet: arm64-osx,
   577|            }
   578|    steps:
   579|      - name: Export GitHub Actions cache environment variables
   580|        uses: actions/github-script@v6
   581|        with:
   582|          script: |
   583|            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
   584|            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
   585|
   586|      - name: Checkout source code
   587|        uses: actions/checkout@v4
   588|        with:
   589|          submodules: recursive
   590|
   591|      - name: Import the codesign cert
   592|        if: env.MACOS_P12_BASE64 != null
   593|        uses: apple-actions/import-codesign-certs@v1
   594|        with:
   595|          p12-file-base64: ${{ secrets.MACOS_P12_BASE64 }}
   596|          p12-password: ${{ secrets.MACOS_P12_PASSWORD }}
   597|          keychain: rustdesk
   598|
   599|      - name: Check sign and import sign key
   600|        if: env.MACOS_P12_BASE64 != null
   601|        run: |
   602|          security default-keychain -s rustdesk.keychain
   603|          security find-identity -v
   604|
   605|      - name: Import notarize key
   606|        if: env.MACOS_P12_BASE64 != null
   607|        uses: timheuer/base64-to-file@v1.2
   608|        with:
   609|          # https://gregoryszorc.com/docs/apple-codesign/stable/apple_codesign_rcodesign.html#notarizing-and-stapling
   610|          fileName: rustdesk.json
   611|          fileDir: ${{ github.workspace }}
   612|          encodedString: ${{ secrets.MACOS_NOTARIZE_JSON }}
   613|
   614|      - name: Install rcodesign tool
   615|        if: env.MACOS_P12_BASE64 != null
   616|        shell: bash
   617|        run: |
   618|          pushd /tmp
   619|          wget https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F0.22.0/apple-codesign-0.22.0-macos-universal.tar.gz
   620|          tar -zxvf apple-codesign-0.22.0-macos-universal.tar.gz
   621|          mv apple-codesign-0.22.0-macos-universal/rcodesign /usr/local/bin
   622|          popd
   623|
   624|      - name: Install build runtime
   625|        run: |
   626|          brew install llvm create-dmg
   627|          # pkg-config is handled in a separate step, because it may be already installed by `macos-latest`(14.7.1) runner
   628|          if command -v pkg-config &>/dev/null; then
   629|              echo "pkg-config is already installed"
   630|          else
   631|              brew install pkg-config
   632|          fi
   633|
   634|      - name: Install NASM
   635|        run: |
   636|          # Install NASM 2.16.x from official release.
   637|          # Do NOT use `brew install nasm` which installs NASM 3.x.
   638|          # NASM 3.x is a complete rewrite with incompatible CLI options and removed features.
   639|          # aom and other multimedia libraries require NASM 2.x for x86/x86_64 assembly.
   640|          wget https://www.nasm.us/pub/nasm/releasebuilds/2.16.03/macosx/nasm-2.16.03-macosx.zip
   641|          unzip nasm-2.16.03-macosx.zip
   642|          sudo cp nasm-2.16.03/nasm /usr/local/bin/nasm
   643|          nasm --version
   644|
   645|      - name: Install flutter
   646|        uses: subosito/flutter-action@v2
   647|        with:
   648|          channel: "stable"
   649|          flutter-version: ${{ env.FLUTTER_VERSION }}
   650|
   651|      - name: Patch flutter
   652|        run: |
   653|          cd $(dirname $(dirname $(which flutter)))
   654|          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply ${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff
   655|
   656|      - name: Workaround for flutter issue
   657|        shell: bash
   658|        run: |
   659|          cd "$(dirname "$(which flutter)")"
   660|          # https://github.com/flutter/flutter/issues/133533
   661|          sed -i -e 's/_setFramesEnabledState(false);/\/\/_setFramesEnabledState(false);/g' ../packages/flutter/lib/src/scheduler/binding.dart
   662|          grep -n '_setFramesEnabledState(false);' ../packages/flutter/lib/src/scheduler/binding.dart
   663|
   664|      - name: Install Rust toolchain
   665|        uses: dtolnay/rust-toolchain@v1
   666|        with:
   667|          toolchain: ${{ env.MAC_RUST_VERSION }}
   668|          targets: ${{ matrix.job.target }}
   669|          components: "rustfmt"
   670|
   671|      - uses: Swatinem/rust-cache@v2
   672|        with:
   673|          prefix-key: ${{ matrix.job.os }}
   674|
   675|      - name: Restore bridge files
   676|        uses: actions/download-artifact@master
   677|        with:
   678|          name: bridge-artifact
   679|          path: ./
   680|
   681|      - name: Setup vcpkg with Github Actions binary cache
   682|        uses: lukka/run-vcpkg@v11
   683|        with:
   684|          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
   685|          doNotCache: false
   686|
   687|      - name: Install vcpkg dependencies
   688|        run: |
   689|          if ! $VCPKG_ROOT/vcpkg \
   690|            install \
   691|            --x-install-root="$VCPKG_ROOT/installed"; then
   692|            find "${VCPKG_ROOT}/" -name "*.log" | while read -r _1; do
   693|              echo "$_1:"
   694|              echo "======"
   695|              cat "$_1"
   696|              echo "======"
   697|              echo ""
   698|            done
   699|            exit 1
   700|          fi
   701|          head -n 100 "${VCPKG_ROOT}/buildtrees/ffmpeg/build-${{ matrix.job.vcpkg-triplet }}-rel-out.log" || true
   702|
   703|      - name: Show version information (Rust, cargo, Clang)
   704|        shell: bash
   705|        run: |
   706|          clang --version || true
   707|          rustup -V
   708|          rustup toolchain list
   709|          rustup default
   710|          cargo -V
   711|          rustc -V
   712|
   713|      - name: Build rustdesk
   714|        run: |
   715|          if [ "${{ matrix.job.target }}" = "aarch64-apple-darwin" ]; then
   716|            MIN_MACOS_VERSION="12.3"
   717|            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET\=[0-9]*.[0-9]*/MACOSX_DEPLOYMENT_TARGET=${MIN_MACOS_VERSION}/" build.py
   718|            sed -i -e "s/platform :osx, '.*'/platform :osx, '${MIN_MACOS_VERSION}'/" flutter/macos/Podfile
   719|            sed -i -e "s/osx_minimum_system_version = \"[0-9]*.[0-9]*\"/osx_minimum_system_version = \"${MIN_MACOS_VERSION}\"/" Cargo.toml
   720|            sed -i -e "s/MACOSX_DEPLOYMENT_TARGET = [0-9]*.[0-9]*;/MACOSX_DEPLOYMENT_TARGET = ${MIN_MACOS_VERSION};/" flutter/macos/Runner.xcodeproj/project.pbxproj
   721|          fi
   722|          ./build.py --flutter --hwcodec --unix-file-copy-paste ${{ matrix.job.extra-build-args }}
   723|
   724|      - name: create unsigned dmg
   725|        if: env.UPLOAD_ARTIFACT == 'true'
   726|        run: |
   727|          CREATE_DMG="$(command -v create-dmg)"
   728|          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
   729|          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
   730|          create-dmg --icon "RustDesk.app" 200 190 --hide-extension "RustDesk.app" --window-size 800 400 --app-drop-link 600 185 LUODA-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg ./flutter/build/macos/Build/Products/Release/RustDesk.app
   731|
   732|      - name: Upload unsigned macOS app
   733|        if: env.UPLOAD_ARTIFACT == 'true'
   734|        uses: actions/upload-artifact@master
   735|        with:
   736|          name: rustdesk-unsigned-macos-${{ matrix.job.arch }}
   737|          path: LUODA-${{ env.VERSION }}-${{ matrix.job.arch }}.dmg # can not upload the directory directly or tar.gz, which destroy the link structure, causing the codesign failed
   738|
   739|      - name: Codesign app and create signed dmg
   740|        if: env.MACOS_P12_BASE64 != null && env.UPLOAD_ARTIFACT == 'true'
   741|        run: |
   742|          # Patch create-dmg to give more attempts to unmount image
   743|          CREATE_DMG="$(command -v create-dmg)"
   744|          CREATE_DMG="$(readlink -f "$CREATE_DMG")"
   745|          sed -i -e 's/MAXIMUM_UNMOUNTING_ATTEMPTS=3/MAXIMUM_UNMOUNTING_ATTEMPTS=7/' "$CREATE_DMG"
   746|          # Unlock keychain
   747|          security default-keychain -s rustdesk.keychain
   748|          security unlock-keychain -p ${{ secrets.MACOS_P12_PASSWORD }} rustdesk.keychain
   749|          # start sign the rustdesk.app and dmg
   750|          rm -rf *.dmg || true
   751|          codesign --force --options runtime -s ${{ secrets.MACOS_CODESIGN_IDENTITY }} --deep --strict ./flutter/build/macos/Build/Products/Release/RustDesk.app -vvv
   752|          create-dmg --icon "RustDesk.app" 200 190 --hide-extension "RustDesk.app" --window-size 800 400 --app-drop-link 600 185 LUODA-${{ env.VERSION }}.dmg ./flutter/build/macos/Build/Products/Release/RustDesk.app
   753|          codesign --force --options runtime -s ${{ secrets.MACOS_CODESIGN_IDENTITY }} --deep --strict LUODA-${{ env.VERSION }}.dmg -vvv
   754|          # notarize the LUODA-${{ env.VERSION }}.dmg
   755|          rcodesign notary-submit --api-key-path ${{ github.workspace }}/rustdesk.json  --staple LUODA-${{ env.VERSION }}.dmg
   756|
   757|      - name: Rename rustdesk
   758|        if: env.UPLOAD_ARTIFACT == 'true'
   759|        run: |
   760|          for name in rustdesk*??.dmg; do
   761|              mv "$name" "${name%%.dmg}-${{ matrix.job.arch }}.dmg"
   762|          done
   763|
   764|      - name: Publish DMG package
   765|        if: env.UPLOAD_ARTIFACT == 'true'
   766|        uses: softprops/action-gh-release@v1
   767|        with:
   768|          prerelease: true
   769|          tag_name: ${{ env.TAG_NAME }}
   770|          files: |
   771|            rustdesk*-${{ matrix.job.arch }}.dmg
