   166|      - name: Build rustdesk
   167|        run: |
   168|          # Windows: build RustDesk
   169|          python3 .\build.py --portable --hwcodec --flutter --vram --skip-portable-pack
   170|          mv ./flutter/build/windows/x64/runner/Release ./rustdesk
   171|
   172|          # Download usbmmidd_v2.zip and extract it to ./rustdesk
   173|          Invoke-WebRequest -Uri https://github.com/rustdesk-org/rdev/releases/download/usbmmidd_v2/usbmmidd_v2.zip -OutFile usbmmidd_v2.zip
   174|          Expand-Archive usbmmidd_v2.zip -DestinationPath .
   175|          Remove-Item -Path usbmmidd_v2\Win32 -Recurse
   176|          Remove-Item -Path "usbmmidd_v2\deviceinstaller64.exe", "usbmmidd_v2\deviceinstaller.exe", "usbmmidd_v2\usbmmidd.bat"
   177|          mv -Force .\usbmmidd_v2 ./rustdesk
   178|
   179|          # Download printer driver files and extract them to ./rustdesk
   180|          try {
   181|            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/rustdesk_printer_driver_v4-1.4.zip -OutFile rustdesk_printer_driver_v4-1.4.zip
   182|            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/printer_driver_adapter.zip -OutFile printer_driver_adapter.zip
   183|            Invoke-WebRequest -Uri https://github.com/rustdesk/hbb_common/releases/download/driver/sha256sums -OutFile sha256sums
   184|
   185|            # Check and move the files
   186|            $checksum_driver = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*rustdesk_printer_driver_v4-1.4\.zip$').Matches.Groups[1].Value
   187|            $downloadsum_driver = Get-FileHash -Path rustdesk_printer_driver_v4-1.4.zip -Algorithm SHA256
   188|            $checksum_adapter = (Select-String -Path .\sha256sums -Pattern '^([a-fA-F0-9]{64}) \*printer_driver_adapter\.zip$').Matches.Groups[1].Value
   189|            $downloadsum_adapter = Get-FileHash -Path printer_driver_adapter.zip -Algorithm SHA256
   190|            if ($checksum_driver -eq $downloadsum_driver.Hash -and $checksum_adapter -eq $downloadsum_adapter.Hash) {
   191|                Write-Output "rustdesk_printer_driver_v4-1.4, checksums match, extract the file."
   192|                Expand-Archive rustdesk_printer_driver_v4-1.4.zip -DestinationPath .
   193|                mkdir ./rustdesk/drivers
   194|                mv -Force .\rustdesk_printer_driver_v4-1.4 ./rustdesk/drivers/RustDeskPrinterDriver
   195|                Expand-Archive printer_driver_adapter.zip -DestinationPath .
   196|                mv -Force .\printer_driver_adapter.dll ./rustdesk
   197|            } elseif ($checksum_driver -ne $downloadsum_driver.Hash) {
   198|                Write-Output "rustdesk_printer_driver_v4-1.4, checksums do not match, ignore the file."
   199|            } else {
   200|                Write-Output "printer_driver_adapter.dll, checksums do not match, ignore the file."
   201|            }
   202|          } catch {
   203|              Write-Host "Ingore the printer driver error."
   204|          }
