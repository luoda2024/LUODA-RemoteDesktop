   112|      # https://github.com/flutter/flutter/issues/155685
   113|      - name: Replace engine with rustdesk custom flutter engine
   114|        run: |
   115|          flutter doctor -v
   116|          flutter precache --windows
   117|          Invoke-WebRequest -Uri https://github.com/rustdesk/engine/releases/download/main/windows-x64-release.zip -OutFile windows-x64-release.zip
   118|          Expand-Archive -Path windows-x64-release.zip -DestinationPath windows-x64-release
   119|          mv -Force windows-x64-release/*  C:/hostedtoolcache/windows/flutter/stable-${{ env.FLUTTER_VERSION }}-x64/bin/cache/artifacts/engine/windows-x64-release/
   120|
   121|      - name: Patch flutter
   122|        shell: bash
   123|        run: |
   124|          cp .github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff $(dirname $(dirname $(which flutter)))
   125|          cd $(dirname $(dirname $(which flutter)))
   126|          [[ "3.24.5" == ${{env.FLUTTER_VERSION}} ]] && git apply flutter_3.24.4_dropdown_menu_enableFilter.diff
   127|
   128|      - name: Install Rust toolchain
   129|        uses: dtolnay/rust-toolchain@v1
