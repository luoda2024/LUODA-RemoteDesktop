name: Build LUODA Windows EXE

on:
  workflow_dispatch:

jobs:
  build-exe:
    runs-on: windows-2022
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75"

      - name: Generate FFI bridge
        run: |
          cargo install cargo-expand --version 1.0.95 --locked
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked
          cd flutter && flutter pub get && cd ..
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart

      - name: Build Flutter Windows
        run: |
          cd flutter
          flutter build windows --release

      - name: Package EXE
        run: |
          mkdir LUODA
          xcopy /E /I flutter\build\windows\x64\runner\Release\* LUODA\
          Compress-Archive -Path LUODA\* -DestinationPath LUODA-windows-x86_64.zip

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-EXE
          path: LUODA-windows-x86_64.zip
