name: Build LUODA Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'libs/**'
      - 'flutter/**'
      - 'res/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'vcpkg.json'
      - '.github/workflows/build-exe.yml'

jobs:
  build-exe:
    runs-on: windows-2022
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-exe-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-exe-${{ runner.os }}-

      - name: Setup Flutter
        timeout-minutes: 10
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.88"

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Ensure correct cargo version
        run: |
          rustup default 1.88
          cargo --version

      - name: Generate FFI bridge
        timeout-minutes: 20
        shell: bash
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "=== Installing cargo-expand ==="
          cargo install cargo-expand --version 1.0.95 --locked 2>&1 | tail -5
          echo "=== Installing flutter_rust_bridge_codegen ==="
          cargo install flutter_rust_bridge_codegen --version 1.80.1 --features uuid --locked 2>&1 | tail -5
          echo "=== Running flutter pub get ==="
          cd flutter && flutter pub get && cd ..
          echo "=== Running flutter_rust_bridge_codegen ==="
          flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart 2>&1
          echo "=== Verifying generated file ==="
          ls -la flutter/lib/generated_bridge.dart || echo "ERROR: generated_bridge.dart not created!"
          head -5 flutter/lib/generated_bridge.dart || echo "ERROR: Cannot read file!"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: C:\vcpkg
          vcpkgGitCommitId: "120deac3062162151622ca4860575a33844ba10b"

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-exe-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-exe-${{ runner.os }}-

      - name: Install vcpkg deps
        run: |
          vcpkg install --triplet x64-windows-static --x-install-root="$env:VCPKG_ROOT\installed"

      - name: Build Rust
        timeout-minutes: 50
        run: |
          cargo clean
          cargo build --release --features flutter
        env:
          VCPKG_ROOT: C:\\\\vcpkg
          VCPKG_DEFAULT_TRIPLET: x64-windows-static
          CXXFLAGS: -include cstdint

      - name: Build Flutter Windows
        timeout-minutes: 15
        run: |
          cd flutter
          flutter clean
          flutter build windows --release

      - name: Sign luoda.exe with LUODA icon
        shell: bash
        run: |
          choco install rcedit -y
          rcedit "flutter/build/windows/x64/runner/Release/luoda.exe" --set-icon "res/icon.ico"

      - name: Package portable EXE
        shell: pwsh
        run: |
          $srcDir = "flutter\\build\\windows\\x64\\runner\\Release"
          $distDir = "dist\\LUODA"
          mkdir $distDir -Force
          Copy-Item -Path "$srcDir\\*" -Destination $distDir -Recurse -Force
          echo "=== Portable directory contents ==="
          dir $distDir
          echo "=== Creating zip ==="
          Compress-Archive -Path $distDir -DestinationPath dist\\LUODA-portable.zip -Force
          echo "=== Zip size ==="
          dir dist\\LUODA-portable.zip

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: LUODA-EXE
          path: dist/LUODA-portable.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          tag_name: nightly
          files: dist/LUODA-portable.zip
