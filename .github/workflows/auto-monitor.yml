name: LUODA Auto Monitor and Fix

on:
  # 定时触发：每30分钟检查一次
  schedule:
    - # DISABLED - 手动触发
  
  # 手动触发
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建所有平台'
        required: false
        default: false
        type: boolean
      platform_filter:
        description: '指定要构建的平台（可选）'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - android
          - linux
          - macos
          - ios
          - windows_exe
          - windows_msi
          - android_apk
          - linux_deb
          - macos_dmg
          - ios_ipa
  
  # 当主构建工作流完成时触发
  workflow_run:
    workflows:
      - "LUODA Build All Platforms"
      - "Full Flutter CI"
    types:
      - completed

jobs:
  monitor-and-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MONITOR_MAX_RETRIES: 3
      MONITOR_RETRY_DELAY: 30
    
    steps:
      - name: 检查代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
    
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
    
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml
    
      - name: 安装构建工具
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            curl git build-essential \
            libssl-dev pkg-config \
            jq  # 用于处理JSON
        
      - name: 设置Rust环境
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: "1.88"
    
      - name: 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
    
      - name: 运行智能监控系统
        id: monitor
        run: |
          echo "🚀 启动LUODA CI/CD智能监控系统"
          echo "=========================================="
          
          # 创建日志目录
          mkdir -p monitor_logs
          
          # 运行监控脚本
          python3 ci_monitor.py 2>&1 | tee monitor_logs/monitor_output.log
          
          # 检查退出代码
          MONITOR_EXIT_CODE=$?
          
          # 分析监控结果
          if [ $MONITOR_EXIT_CODE -eq 0 ]; then
            echo "✅ 监控系统运行正常"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ 监控系统检测到问题"
            echo "success=false" >> $GITHUB_OUTPUT
            
            # 检查是否有专家报告
            if [ -f expert_report*.txt ]; then
              REPORT_FILE=$(ls expert_report*.txt | head -1)
              echo "📋 生成专家报告: $REPORT_FILE"
              
              # 输出报告内容
              echo "::group::需要咨询DeepSeek V4.0pro的错误列表"
              cat "$REPORT_FILE"
              echo "::endgroup::"
              
              echo "report_file=$REPORT_FILE" >> $GITHUB_OUTPUT
            fi
          fi
          
          # 保存监控日志
          echo "📁 监控日志已保存到: monitor_logs/"
          
        continue-on-error: true
    
      - name: 分析监控结果并触发修复
        if: steps.monitor.outputs.success == 'false'
        run: |
          echo "🔧 分析监控结果并准备修复..."
          
          # 检查专家报告
          if [ -n "${{ steps.monitor.outputs.report_file }}" ]; then
            echo "⚠️  检测到需要专家处理的错误"
            echo "请将以下文件中的错误列表咨询DeepSeek V4.0pro:"
            echo "${{ steps.monitor.outputs.report_file }}"
            
            # 输出报告摘要
            REPORT_CONTENT=$(head -50 "${{ steps.monitor.outputs.report_file }}" 2>/dev/null || echo "无法读取报告")
            echo "::group::错误报告摘要"
            echo "$REPORT_CONTENT"
            echo "::endgroup::"
          fi
          
          # 运行自动修复模块
          echo "🛠️  运行自动修复模块..."
          python3 auto_fix.py 2>&1 | tee monitor_logs/auto_fix.log
          
          # 检查修复是否成功
          if [ $? -eq 0 ]; then
            echo "✅ 自动修复完成"
            
            # 检查是否需要重新触发构建
            echo "🔄 检查是否需要重新触发构建..."
            
            # 读取修复日志
            if grep -q "修复成功" monitor_logs/auto_fix.log; then
              echo "检测到成功修复，准备重新触发构建工作流"
              echo "needs_rebuild=true" >> $GITHUB_OUTPUT
            else
              echo "无需重新构建"
              echo "needs_rebuild=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "❌ 自动修复失败"
            echo "needs_rebuild=false" >> $GITHUB_OUTPUT
          fi
    
      - name: 触发重新构建
        if: steps.monitor.outputs.success == 'false' && steps.monitor.outputs.needs_rebuild == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: build.yml
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master
          inputs: '{"trigger_source": "auto_monitor_fix"}'
    
      - name: 发送通知
        run: |
          echo "📢 发送监控结果通知"
          
          MONITOR_STATUS="${{ steps.monitor.outputs.success }}"
          NEEDS_REBUILD="${{ steps.monitor.outputs.needs_rebuild || 'false' }}"
          REPORT_FILE="${{ steps.monitor.outputs.report_file || 'none' }}"
          
          # 构建通知消息
          if [ "$MONITOR_STATUS" = "true" ]; then
            MESSAGE="✅ LUODA CI/CD监控: 所有构建正常"
            EMOJI="✅"
          else
            if [ "$NEEDS_REBUILD" = "true" ]; then
              MESSAGE="🔄 LUODA CI/CD监控: 检测到问题，已自动修复并重新触发构建"
              EMOJI="🔄"
            elif [ "$REPORT_FILE" != "none" ]; then
              MESSAGE="⚠️ LUODA CI/CD监控: 检测到需要专家处理的问题"
              EMOJI="⚠️"
            else
              MESSAGE="❌ LUODA CI/CD监控: 检测到问题，但无法自动修复"
              EMOJI="❌"
            fi
          fi
          
          # 添加详细信息
          MESSAGE="$MESSAGE\n\n"
          MESSAGE="${MESSAGE}运行ID: ${{ github.run_id }}\n"
          MESSAGE="${MESSAGE}运行链接: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\n"
          
          if [ "$REPORT_FILE" != "none" ]; then
            MESSAGE="${MESSAGE}专家报告: $REPORT_FILE\n"
            MESSAGE="${MESSAGE}请将报告内容咨询DeepSeek V4.0pro获取解决方案"
          fi
          
          # 输出通知
          echo "::notice::$EMOJI $MESSAGE"
          
          # 可以集成到其他通知系统，如Slack、Discord等
          # 例如:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"$MESSAGE\"}" \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
    
      - name: 上传监控日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs-${{ github.run_id }}
          path: |
            monitor_logs/
            expert_report*.txt
          retention-days: 7
    
      - name: 生成监控报告
        if: always()
        run: |
          echo "📊 生成监控报告..."
          
          REPORT_FILE="monitor_report_$(date +%Y%m%d_%H%M%S).md"
          
          cat > "$REPORT_FILE" << EOF
          # LUODA CI/CD 监控报告
          
          ## 运行信息
          - **运行ID**: ${{ github.run_id }}
          - **触发时间**: $(date)
          - **仓库**: ${{ github.repository }}
          - **分支**: ${{ github.ref }}
          
          ## 监控结果
          EOF
          
          if [ "${{ steps.monitor.outputs.success }}" = "true" ]; then
            echo "- ✅ **状态**: 所有构建正常" >> "$REPORT_FILE"
          else
            echo "- ❌ **状态**: 检测到问题" >> "$REPORT_FILE"
            echo "- **需要重建**: ${{ steps.monitor.outputs.needs_rebuild || 'false' }}" >> "$REPORT_FILE"
            echo "- **专家报告**: ${{ steps.monitor.outputs.report_file || '无' }}" >> "$REPORT_FILE"
          fi
          
          echo "" >> "$REPORT_FILE"
          echo "## 日志文件" >> "$REPORT_FILE"
          echo "- 监控日志: [monitor_logs/](monitor_logs/)" >> "$REPORT_FILE"
          
          if [ -f "expert_report"*.txt ]; then
            echo "- 专家报告: [expert_report_*.txt](expert_report_*.txt)" >> "$REPORT_FILE"
          fi
          
          echo "" >> "$REPORT_FILE"
          echo "## 建议操作" >> "$REPORT_FILE"
          
          if [ "${{ steps.monitor.outputs.success }}" = "true" ]; then
            echo "✅ 无需操作，所有构建正常" >> "$REPORT_FILE"
          elif [ "${{ steps.monitor.outputs.report_file }}" != "" ]; then
            echo "⚠️ **需要人工干预**: 请将专家报告中的错误列表咨询DeepSeek V4.0pro" >> "$REPORT_FILE"
            echo "" >> "$REPORT_FILE"
            echo "### 咨询步骤:" >> "$REPORT_FILE"
            echo "1. 查看专家报告文件" >> "$REPORT_FILE"
            echo "2. 复制错误列表" >> "$REPORT_FILE"
            echo "3. 向DeepSeek V4.0pro提问获取解决方案" >> "$REPORT_FILE"
            echo "4. 根据建议修改代码或配置" >> "$REPORT_FILE"
            echo "5. 重新触发构建" >> "$REPORT_FILE"
          elif [ "${{ steps.monitor.outputs.needs_rebuild }}" = "true" ]; then
            echo "🔄 已自动修复并重新触发构建，请等待构建完成" >> "$REPORT_FILE"
          else
            echo "❌ 自动修复失败，需要手动检查" >> "$REPORT_FILE"
          fi
          
          echo "" >> "$REPORT_FILE"
          echo "---" >> "$REPORT_FILE"
          echo "*报告生成时间: $(date)*" >> "$REPORT_FILE"
          
          # 上传报告
          echo "📄 监控报告已生成: $REPORT_FILE"
    
      - name: 上传监控报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-report-${{ github.run_id }}
          path: |
            monitor_report_*.md
          retention-days: 30