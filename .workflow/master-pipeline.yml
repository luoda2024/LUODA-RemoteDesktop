version: '1.0'
name: luoda-build
displayName: LUODA Build Pipeline
stages:
  - stage: 
    name: prepare
    displayName: 准备环境
    steps:
      - step: tool@install
        name: install_tools
        displayName: 安装工具
        tool:
          - name: flutter
            version: '3.16'
          - name: rust
            version: '1.75'
          
  - stage: 
    name: build_flutter
    displayName: Flutter 构建
    steps:
      - step: build@flutter
        name: build_flutter_desktop
        displayName: Flutter Desktop 构建
        flutterVersion: '3.16'
        commands:
          - cd flutter
          - flutter pub get
          - flutter build windows --release
        artifacts:
          - name: FLUTTER_BUILD
            path:
              - ./flutter/build/windows
              
  - stage: 
    name: build_rust
    displayName: Rust 构建
    steps:
      - step: build@rust
        name: build_rust_lib
        displayName: Rust 库构建
        rustVersion: '1.75'
        commands:
          - cargo build --release
        artifacts:
          - name: RUST_BUILD
            path:
              - ./target/release
              
  - stage: 
    name: package
    displayName: 打包
    steps:
      - step: script@shell
        name: package_windows
        displayName: Windows 打包
        script: |
          #!/bin/bash
          python3 build.py --flutter --release
        artifacts:
          - name: WINDOWS_PACKAGE
            path:
              - ./target/release/luoda.exe
              - ./target/release/*.msi

triggers:
  push:
    branches:
      include:
        - master
    tags:
      include:
        - "v*"
  pull_request:
    branches:
      include:
        - master
